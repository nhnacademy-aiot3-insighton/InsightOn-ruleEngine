spring.application.name=insighton-ruleengine
server.port=8080
eureka.client.service-url.defaultZone=http://insighton-eureka:8761/eureka/
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=health
spring.config.import=configserver:http://insighton-config:8888
spring.cloud.config.username=${CONFIG_SERVER_USERNAME}
spring.cloud.config.password=${CONFIG_SERVER_PASSWORD}
